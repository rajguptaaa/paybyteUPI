name: CI — PaybyteUPI Payment Gateway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test

jobs:

  # ─── Job 1: Validate all services ─────────────────────────────
  validate:
    name: Validate services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate auth-service
        working-directory: services/auth-service
        run: |
          npm ci
          echo "auth-service dependencies OK"

      - name: Validate wallet-service
        working-directory: services/wallet-service
        run: |
          npm ci
          echo "wallet-service dependencies OK"

      - name: Validate transaction-service
        working-directory: services/transaction-service
        run: |
          npm ci
          echo "transaction-service dependencies OK"

      - name: Validate api-gateway
        working-directory: services/api-gateway
        run: |
          npm ci
          echo "api-gateway dependencies OK"

      - name: Validate notification-service
        working-directory: services/notification-service
        run: |
          npm ci
          echo "notification-service dependencies OK"

  # ─── Job 2: Docker build ───────────────────────────────────────
  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: false
          tags: paybyte/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build wallet-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/wallet-service
          push: false
          tags: paybyte/wallet-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build transaction-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/transaction-service
          push: false
          tags: paybyte/transaction-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build notification-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/notification-service
          push: false
          tags: paybyte/notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: false
          tags: paybyte/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Integration health checks ─────────────────────────
  integration:
    name: Integration health checks
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test .env
        run: |
          cat > .env << EOF
          NODE_ENV=test

          JWT_ACCESS_SECRET=ci_test_secret_access_key_123
          JWT_REFRESH_SECRET=ci_test_secret_refresh_key_123
          JWT_ACCESS_EXPIRES=15m
          JWT_REFRESH_EXPIRES=7d

          MONGODB_URI=${{ secrets.MONGODB_URI_TEST }}

          MYSQL_HOST=mysql
          MYSQL_PORT=3306
          MYSQL_USER=root
          MYSQL_ROOT_PASSWORD=ci_test_password
          MYSQL_DATABASE=paybyte_test

          REDIS_HOST=redis
          REDIS_PORT=6379

          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          RABBITMQ_USER=guest
          RABBITMQ_PASSWORD=guest

          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=test@example.com
          SMTP_PASS=dummy_pass_ci
          EMAIL_FROM=PopUPI <test@example.com>

          INTERNAL_SECRET=ci_internal_secret
          AUTH_SERVICE_URL=http://auth-service:4001
          WALLET_SERVICE_URL=http://wallet-service:4002
          TRANSACTION_SERVICE_URL=http://transaction-service:4003
          EOF

      - name: Start infrastructure
        run: |
          docker-compose up -d mysql redis rabbitmq
          echo "Waiting for infrastructure..."
          sleep 20

      - name: Check MySQL is healthy
        run: |
          docker-compose exec -T mysql mysqladmin ping -h localhost -u root -pci_test_password
          echo "MySQL is healthy"

      - name: Check Redis is healthy
        run: |
          docker-compose exec -T redis redis-cli PING
          echo "Redis is healthy"

      - name: Check RabbitMQ is healthy
        run: |
          docker-compose exec -T rabbitmq rabbitmq-diagnostics ping
          echo "RabbitMQ is healthy"

      - name: Start application services
        run: |
          docker-compose up -d auth-service wallet-service transaction-service api-gateway
          echo "Waiting for services to start..."
          sleep 30

      - name: Health check — auth-service
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://localhost:4001/health
          echo "auth-service healthy"

      - name: Health check — wallet-service
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://localhost:4002/health
          echo "wallet-service healthy"

      - name: Health check — transaction-service
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://localhost:4003/health
          echo "transaction-service healthy"

      - name: Health check — api-gateway
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://localhost:4000/health
          echo "api-gateway healthy"

      - name: Verify MySQL tables created
        run: |
          docker-compose exec -T mysql mysql -u root -pci_test_password paybyte_test \
            -e "SHOW TABLES;" | grep -E "wallets|transactions|ledger_entries"
          echo "Database tables verified"

      - name: Print logs on failure
        if: failure()
        run: |
          echo "=== AUTH SERVICE LOGS ==="
          docker-compose logs auth-service
          echo "=== WALLET SERVICE LOGS ==="
          docker-compose logs wallet-service
          echo "=== TRANSACTION SERVICE LOGS ==="
          docker-compose logs transaction-service
          echo "=== API GATEWAY LOGS ==="
          docker-compose logs api-gateway

      - name: Cleanup
        if: always()
        run: docker-compose down -v