version: '3.9'

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    env_file: .env
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - paybyte-net

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      - auth-service
      - wallet-service
      - transaction-service
    networks:
      - paybyte-net
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    environment:
      - AUTH_SERVICE_URL=http://auth-service:4001
      - WALLET_SERVICE_URL=http://wallet-service:4002
      - TRANSACTION_SERVICE_URL=http://transaction-service:4003

  auth-service:
    build: ./services/auth-service
    env_file: .env
    ports:
      - "4001:4001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - paybyte-net
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules

  wallet-service:
    build: ./services/wallet-service
    env_file: .env
    ports:
      - "4002:4002"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - paybyte-net
    volumes:
      - ./services/wallet-service:/app
      - /app/node_modules

  transaction-service:
    build: ./services/transaction-service
    ports:
      - "4003:4003"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - paybyte-net
    volumes:
      - ./services/transaction-service:/app
      - /app/node_modules

  notification-service:
    build: ./services/notification-service
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - paybyte-net
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: paybyte_db
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - paybyte-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass redispassword123
    volumes:
      - redis-data:/data
    networks:
      - paybyte-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: rabbitpassword123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - paybyte-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:

networks:
  paybyte-net:
    driver: bridge